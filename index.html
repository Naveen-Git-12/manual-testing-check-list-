  .tabs button { padding: 10px 28px; border: none; border-radius: 10px; cursor: pointer; font-size: 0.88rem; font-weight: 500; background: transparent; color: var(--text3); transition: all 0.2s; font-family: inherit; }

  .flow-hd .count { font-size: 0.72rem; color: var(--text3); font-weight: 600; margin-left: 6px; background: var(--bg5); padding: 2px 8px; border-radius: 6px; }
  .flow-hd .act { display: flex; gap: 3px; margin-left: auto; }

  .flow-hd .act .edit:hover { color: var(--accent); background: var(--accent3); }
  .flow-hd .act .del:hover { color: var(--red); background: var(--red-bg); }
  .flow-hd .act .addt:hover { color: var(--green); background: var(--green-bg); }

  .flow.collapsed .ins-btn { display: none; }
  .flow.collapsed .flow-hd { border-bottom: none; }

  .case-label.pos { color: var(--green); }
  .case-label.neg { color: var(--red); }

  .test { display: flex; align-items: center; gap: 12px; padding: 12px 22px; border-bottom: 1px solid var(--border3); transition: background 0.1s; }

  .test .btns .no { color: var(--red); }

  .undo-bar button { background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: 8px 18px; cursor: pointer; font-size: 0.8rem; font-weight: 600; margin-left: auto; transition: all 0.2s; font-family: inherit; }

  .sync-status { font-size: 0.75rem; color: var(--text3); margin-left: 8px; font-weight: 500; }
  .sync-status.syncing { color: #fbbf24; }
  .sync-status.synced { color: var(--green); }
  .sync-status.error { color: var(--red); }
</style>
</head>

let tab = 'client';
let subTab = 'bar_owner';
let data = [];
let undo = null;
let undoTimer = null;

function dataKey() { return tab === 'client' ? 'client' : subTab; }

function setSyncStatus(status) {
  const el = document.getElementById('syncStatus');
  el.className = 'sync-status ' + status;
  if (status === 'syncing') el.textContent = '⏳ Saving...';
  else if (status === 'synced') el.textContent = '✓ Synced';
  else if (status === 'error') el.textContent = '✗ Save failed';
  else el.textContent = '';
}

async function loadData() {
  setSyncStatus('syncing');
  const key = dataKey();
  try {
    const res = await fetch(SB_URL + '/rest/v1/abo_data?id=eq.main&select=*', { headers: sbHeaders() });
    const rows = await res.json();
    if (rows && rows.length > 0) {
      const row = rows[0];
      if (row[key] && row[key].length > 0) {
        data = row[key];
      } else {
        data = JSON.parse(JSON.stringify(DEFAULT_FLOWS[key] || []));
        await saveData();
      }
      const nk = tab === 'client' ? 'notes_client' : 'notes_' + subTab;
      document.getElementById('notesArea').value = row[nk] || '';
    } else {
      data = JSON.parse(JSON.stringify(DEFAULT_FLOWS[key] || []));
      document.getElementById('notesArea').value = '';
      await saveData();
    }
    setSyncStatus('synced');
  } catch(e) {
    console.error('Load error:', e);
    data = JSON.parse(JSON.stringify(DEFAULT_FLOWS[key] || []));
    document.getElementById('notesArea').value = '';
    setSyncStatus('error');
  }
}

async function saveData() {
  setSyncStatus('syncing');
  const key = dataKey();
  try {
    const notesVal = document.getElementById('notesArea').value;
    const update = { id: 'main' };
    update[key] = data;
    const nk = tab === 'client' ? 'notes_client' : 'notes_' + subTab;
    update[nk] = notesVal;

    const res = await fetch(SB_URL + '/rest/v1/abo_data?id=eq.main', {
      method: 'PATCH',
      headers: sbHeaders(),
      body: JSON.stringify(update)
    });
    if (!res.ok) throw new Error('Save failed');
    setSyncStatus('synced');
  } catch(e) {
    console.error('Save error:', e);
    setSyncStatus('error');
  }
}

function save() { saveData(); }
let notesTimer;
function saveNotes() { clearTimeout(notesTimer); notesTimer = setTimeout(saveData, 500); }

async function clearNotes() {
  if (!confirm('Clear all notes for this tab?')) return;
  document.getElementById('notesArea').value = '';
  await saveData();
}

function clearUndo() { clearTimeout(undoTimer); undo = null; document.getElementById('undoBar').classList.remove('show'); }

async function switchTab(t) {
  tab = t;
  clearUndo();
  document.querySelectorAll('#tabs button').forEach(b => b.classList.toggle('active', b.dataset.tab === t));
  document.getElementById('subtabs').style.display = t === 'admin' ? 'flex' : 'none';
  document.getElementById('search').value = '';
  await loadData();
  render();
}

async function switchSubTab(st) {
  subTab = st;
  clearUndo();
  document.querySelectorAll('#subtabs button').forEach(b => b.classList.toggle('active', b.dataset.sub === st));
  document.getElementById('search').value = '';
  await loadData();
  render();
}

function setStatus(fi, ti, status) { clearUndo(); data[fi].tests[ti].status = data[fi].tests[ti].status === status ? '' : status; save(); render(); }
function toggleNote(fi, ti) { const el = document.getElementById('n_' + fi + '_' + ti); if (el) el.classList.toggle('open'); }
function updateNote(fi, ti, val) { data[fi].tests[ti].desc = val; save(); }

function removeTest(fi, ti) {
  const name = data[fi].tests[ti].name;
  if (!confirm('Delete "' + name + '"?')) return;
  const snap = JSON.parse(JSON.stringify(data));
  data[fi].tests.splice(ti, 1);
  if (data[fi].tests.length === 0) { data.splice(fi, 1); undo = { snapshot: snap }; save(); render(); showUndo('Deleted flow "' + snap[fi].flow + '"'); return; }
  undo = { snapshot: snap }; save(); render(); showUndo('Deleted "' + name + '"');
}

function removeFlow(fi) {
  if (!confirm('Delete flow "' + data[fi].flow + '" and all its tests?')) return;
  const snap = JSON.parse(JSON.stringify(data));
  data.splice(fi, 1);
  undo = { snapshot: snap }; save(); render(); showUndo('Deleted flow "' + snap[fi].flow + '"');
}

function showUndo(msg) { clearTimeout(undoTimer); document.getElementById('undoMsg').textContent = msg; document.getElementById('undoBar').classList.add('show'); undoTimer = setTimeout(() => { document.getElementById('undoBar').classList.remove('show'); undo = null; }, 10000); }

function undoDelete() { if (!undo) return; data = JSON.parse(JSON.stringify(undo.snapshot)); undo = null; clearTimeout(undoTimer); document.getElementById('undoBar').classList.remove('show'); save(); render(); }

function editTestName(fi, ti) {
  const cur = data[fi].tests[ti].name;
  const name = prompt('Edit test name:', cur);
  if (name && name !== cur) { data[fi].tests[ti].name = name; save(); render(); }
}

function editFlowName(fi) {
  const cur = data[fi].flow;
  const name = prompt('Edit flow name:', cur);
  if (name && name !== cur) { data[fi].flow = name; save(); render(); }
}

function editFlowNum(fi) {
  const cur = data[fi].num;
  const n = prompt('Edit flow number:', cur);
  if (n && n !== cur) { data[fi].num = n; save(); render(); }
}

function addTest(fi, type) {
  clearUndo();
  const name = prompt(type === 'positive' ? 'Positive test name:' : 'Negative test name:');
  if (!name) return;
  data[fi].tests.push({ name, desc: '', status: '', type });
  save(); render();
}

function insertTest(fi, afterIdx, type) {
  clearUndo();
  const name = prompt('Test name to insert:');
  if (!name) return;
  const pos = Math.max(0, afterIdx + 1);
  data[fi].tests.splice(pos, 0, { name, desc: '', status: '', type });
  save(); render();
}

function addFlow() {
  clearUndo();
  const name = prompt('Flow name:');
  if (!name) return;
  const maxNum = data.reduce((m, f) => Math.max(m, parseInt(f.num) || 0), 0);
  data.push({ num: String(maxNum + 1), flow: name, tests: [] });
  save(); render();
}

function reset() {
  if (!confirm('Reset all tests to defaults?')) return;
  clearUndo();
  data = JSON.parse(JSON.stringify(DEFAULT_FLOWS[dataKey()] || []));
  save(); render();
}

function clearStatus() {
  if (!confirm('Clear all pass/fail statuses?')) return;
  data.forEach(f => f.tests.forEach(t => t.status = ''));
  save(); render();
}

let dragIdx = null;
let collapsed = new Set();

function dragStart(e, idx) {
  dragIdx = idx;
  e.dataTransfer.effectAllowed = 'move';
  e.target.closest('.flow').classList.add('dragging');
  setTimeout(() => e.target.closest('.flow').style.opacity = '0.4', 0);
}

function dragEnd(e) {
  dragIdx = null;
  document.querySelectorAll('.flow').forEach(f => { f.classList.remove('dragging', 'dragover'); f.style.opacity = ''; });
}

function dragOver(e, idx) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  document.querySelectorAll('.flow').forEach(f => f.classList.remove('dragover'));
  if (idx !== dragIdx) e.currentTarget.closest('.flow').classList.add('dragover');
}

function dragLeave(e) { e.currentTarget.closest('.flow').classList.remove('dragover'); }

function renumberFlows() { data.forEach((f, i) => f.num = String(i + 1)); }

function drop(e, idx) {
  e.preventDefault();
  if (dragIdx === null || dragIdx === idx) return;
  const item = data.splice(dragIdx, 1)[0];
  data.splice(idx, 0, item);
  renumberFlows();
  dragIdx = null;
  save(); render();
}

function moveFlow(idx, dir) {
  const ni = idx + dir;
  if (ni < 0 || ni >= data.length) return;
  const item = data.splice(idx, 1)[0];
  data.splice(ni, 0, item);
  renumberFlows();
  save(); render();
}

function toggleCollapse(idx) {
  if (collapsed.has(idx)) collapsed.delete(idx);
  else collapsed.add(idx);
  render();
}

function render() {
  const q = (document.getElementById('search').value || '').toLowerCase();
  const el = document.getElementById('content');
  let pass = 0, fail = 0, total = 0;
  data.forEach(f => f.tests.forEach(t => { total++; if (t.status === 'pass') pass++; else if (t.status === 'fail') fail++; }));

  const filtered = data.map(f => {
    const tests = q ? f.tests.filter(t => t.name.toLowerCase().includes(q) || f.flow.toLowerCase().includes(q)) : f.tests;
    return { ...f, tests };
  }).filter(f => q ? f.tests.length > 0 : true);

  if (filtered.length === 0) {
    el.innerHTML = '<div class="empty">' + (q ? 'No results for "' + q + '"' : 'No flows yet. Click "+ Flow" to add one.') + '</div>';
    document.getElementById('cnt').innerHTML = '<span class="g">✓ ' + pass + '</span><span class="r">✗ ' + fail + '</span><span class="gr">— ' + (total - pass - fail) + '</span><span>| ' + total + '</span>';
    return;
  }

  let html = '';
  filtered.forEach((f) => {
    let idx = data.findIndex(d => d.flow === f.flow && d.num === f.num);
    if (idx < 0) idx = 0;
    const pos = f.tests.filter(t => t.type !== 'negative');
    const neg = f.tests.filter(t => t.type === 'negative');

    html += '<div class="flow' + (collapsed.has(idx) ? ' collapsed' : '') + '" draggable="true" ondragstart="dragStart(event,' + idx + ')" ondragend="dragEnd(event)" ondragover="dragOver(event,' + idx + ')" ondragleave="dragLeave(event)" ondrop="drop(event,' + idx + ')"><div class="flow-hd">';
    html += '<span class="grip" title="Drag to reorder">⠿</span>';
    html += '<span class="num" onclick="editFlowNum(' + idx + ')" title="Edit number">' + f.num + '</span>';
    html += '<span class="fname" onclick="editFlowName(' + idx + ')" title="Edit name">' + f.flow + '</span>';
    html += '<span class="count">' + f.tests.length + '</span>';
    html += '<div class="act">';
    html += '<button class="edit" onclick="toggleCollapse(' + idx + ')" title="Minimize">' + (collapsed.has(idx) ? '▸' : '▾') + '</button>';
    html += '<button class="addt" onclick="addTest(' + idx + ', \'positive\')" title="Add positive test">+</button>';
    html += '<button class="addt" onclick="addTest(' + idx + ', \'negative\')" title="Add negative test">−</button>';
    html += '<button class="edit" onclick="editFlowName(' + idx + ')" title="Edit flow">✎</button>';
    html += '<button class="del" onclick="removeFlow(' + idx + ')" title="Delete flow">✕</button>';
    html += '<button class="edit" onclick="moveFlow(' + idx + ',-1)" title="Move up">▲</button>';
    html += '<button class="edit" onclick="moveFlow(' + idx + ',1)" title="Move down">▼</button>';
    html += '</div></div>';

    if (pos.length > 0) {
      html += '<div class="case-group"><div class="case-label pos">✓ Positive Cases</div>';
      html += '<div class="ins-btn" onclick="insertTest(' + idx + ', ' + (data[idx].tests.indexOf(pos[0]) - 1) + ', \'positive\')" title="Insert before">+</div>';
      pos.forEach((t) => {
        const ti = data[idx].tests.indexOf(t);
        html += renderTest(t, idx, ti);
        html += '<div class="ins-btn" onclick="insertTest(' + idx + ', ' + ti + ', \'positive\')" title="Insert after">+</div>';
      });
      html += '</div>';
    }

    if (neg.length > 0) {
      html += '<div class="case-group"><div class="case-label neg">✗ Negative Cases</div>';
      html += '<div class="ins-btn" onclick="insertTest(' + idx + ', ' + (data[idx].tests.indexOf(neg[0]) - 1) + ', \'negative\')" title="Insert before">+</div>';
      neg.forEach((t) => {
        const ti = data[idx].tests.indexOf(t);
        html += renderTest(t, idx, ti);
        html += '<div class="ins-btn" onclick="insertTest(' + idx + ', ' + ti + ', \'negative\')" title="Insert after">+</div>';
      });
      html += '</div>';
    }
    html += '</div>';
  });

  el.innerHTML = html;
  document.getElementById('cnt').innerHTML = '<span class="g">✓ ' + pass + '</span><span class="r">✗ ' + fail + '</span><span class="gr">— ' + (total - pass - fail) + '</span><span>| ' + total + '</span>';
  const label = tab === 'client' ? 'Client' : subTab.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
  document.title = 'ABO ' + label + ' (' + pass + '/' + total + ')';
}

function renderTest(t, fi, ti) {
  const s = t.status || '';
  let h = '<div class="test"><div class="body">';
  h += '<div class="label" onclick="toggleNote(' + fi + ',' + ti + ')">' + t.name + '</div>';
  h += '<div class="note" id="n_' + fi + '_' + ti + '">';
  h += '<textarea placeholder="Notes..." oninput="updateNote(' + fi + ',' + ti + ', this.value)">' + (t.desc || '') + '</textarea>';
  h += '</div></div><div class="btns">';
  h += '<button class="ok ' + (s === 'pass' ? 'on' : '') + '" onclick="setStatus(' + fi + ',' + ti + ', \'pass\')" title="Pass">✓</button>';
  h += '<button class="no ' + (s === 'fail' ? 'on' : '') + '" onclick="setStatus(' + fi + ',' + ti + ', \'fail\')" title="Fail">✗</button>';
  h += '<button class="edit-btn" onclick="editTestName(' + fi + ',' + ti + ')" title="Edit name">✎</button>';
  h += '<button class="trash" onclick="removeTest(' + fi + ',' + ti + ')" title="Delete">✕</button>';
  h += '</div></div>';
  return h;
}

  html += '.summary div{font-size:.9rem}.summary .g{color:#16a34a;font-weight:600}.summary .r{color:#dc2626;font-weight:600}.summary .gr{color:#888}';
  html += '.flow{margin-bottom:20px;border:1px solid #e8eaee;border-radius:10px;overflow:hidden}';
  html += '.flow-hd{background:#f8f9fb;padding:10px 16px;font-weight:600;font-size:.95rem;border-bottom:1px solid #e8eaee}';
  html += '.pos-label{padding:6px 16px 2px;font-size:.72rem;text-transform:uppercase;letter-spacing:.5px;color:#16a34a;font-weight:600}';
  html += '.neg-label{padding:6px 16px 2px;font-size:.72rem;text-transform:uppercase;letter-spacing:.5px;color:#dc2626;font-weight:600}';
  html += '.test{display:flex;align-items:center;gap:10px;padding:7px 16px;border-bottom:1px solid #f2f3f6;font-size:.88rem}';
  html += '.test:last-child{border-bottom:none}.test .name{flex:1}';
  html += '.test .s{font-size:.75rem;font-weight:600;padding:2px 10px;border-radius:10px;flex-shrink:0}';
  html += '.s.pass{background:#dcfce7;color:#16a34a}.s.fail{background:#fee2e2;color:#dc2626}.s.na{background:#f2f2f2;color:#999}';
  html += '.test .notes{font-size:.75rem;color:#888;margin-left:12px}';
  html += '.footer{margin-top:28px;padding-top:16px;border-top:1px solid #e8eaee;font-size:.8rem;color:#888;text-align:center}';
  html += '@media print{body{margin:20px}.no-print{display:none}}</style></head><body>';
  html += '<h1>ABO Test Report — ' + label + '</h1><div class="sub">' + date + '</div>';
  html += '<div class="summary"><div><span class="g">✓ Passed:</span> ' + pass + '</div><div><span class="r">✗ Failed:</span> ' + fail + '</div><div><span class="gr">— Untested:</span> ' + (total - pass - fail) + '</div><div><strong>Total:</strong> ' + total + '</div></div>';

  data.forEach(f => {
    html += '<div class="flow"><div class="flow-hd">' + f.num + '. ' + f.flow + ' <span style="font-weight:400;color:#888;font-size:.8rem;">(' + f.tests.length + ')</span></div>';
    const pos = f.tests.filter(t => t.type !== 'negative');
    const neg = f.tests.filter(t => t.type === 'negative');
    if (pos.length) { html += '<div class="pos-label">✓ Positive Cases</div>'; pos.forEach(t => { const s2 = t.status === 'pass' ? 'pass' : t.status === 'fail' ? 'fail' : 'na'; const sl = t.status === 'pass' ? 'PASS' : t.status === 'fail' ? 'FAIL' : 'NOT TESTED'; html += '<div class="test"><span class="name">' + t.name + '</span><span class="s ' + s2 + '">' + sl + '</span>' + (t.desc ? '<span class="notes">' + t.desc + '</span>' : '') + '</div>'; }); }
    if (neg.length) { html += '<div class="neg-label">✗ Negative Cases</div>'; neg.forEach(t => { const s2 = t.status === 'pass' ? 'pass' : t.status === 'fail' ? 'fail' : 'na'; const sl = t.status === 'pass' ? 'PASS' : t.status === 'fail' ? 'FAIL' : 'NOT TESTED'; html += '<div class="test"><span class="name">' + t.name + '</span><span class="s ' + s2 + '">' + sl + '</span>' + (t.desc ? '<span class="notes">' + t.desc + '</span>' : '') + '</div>'; }); }
    html += '</div>';
  });

  html += '<div class="footer">Generated by ABO Test Sheet</div>';
  html += '<div class="no-print" style="text-align:center;margin-top:16px;"><button onclick="window.print()" style="padding:10px 28px;border-radius:8px;border:1px solid #4f46e5;background:#4f46e5;color:#fff;font-size:1rem;cursor:pointer;">📄 Save as PDF</button></div>';
  html += '</body></html>';

  const w = window.open('', '_blank');
  w.document.write(html);
  w.document.close();
}

document.getElementById('today').textContent = new Date().toLocaleDateString('en-IN', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
loadData().then(() => render());
</script>
</body>
</html>
